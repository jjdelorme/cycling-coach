steps:
  # Write VERSION from the beta tag that triggered this build ($TAG_NAME is set by Cloud Build for tag triggers)
  - name: 'bash'
    args:
      - '-c'
      - |
        TAG="${TAG_NAME}"
        echo "$${TAG#v}" > /workspace/VERSION
        echo "$$TAG" > /workspace/TAG_VERSION
        echo "VERSION: $$(cat /workspace/VERSION)"

  # Build container image tagged with the version tag
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build \
          --build-arg "APP_VERSION=$$(cat /workspace/VERSION)" \
          --build-arg "VITE_GOOGLE_CLIENT_ID=$$GOOGLE_CLIENT_ID" \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:$$(cat /workspace/TAG_VERSION) \
          .
    secretEnv: ['GOOGLE_CLIENT_ID']

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker push ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:$$(cat /workspace/TAG_VERSION)

  # Deploy to Cloud Run under the 'test' tag (no production traffic)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        SERVICE_URL=$$(gcloud run services describe ${_SERVICE_NAME} \
          --region ${_REGION} \
          --format 'value(status.url)' 2>/dev/null || echo '')

        TEST_URL=$$(gcloud run services describe ${_SERVICE_NAME} \
          --region ${_REGION} \
          --format 'json' 2>/dev/null | \
          jq -r '(.status.traffic // [])[] | select(.tag=="test") | .url // ""' 2>/dev/null || echo '')

        WITHINGS_REDIRECT="$${TEST_URL:-$${SERVICE_URL}}/api/withings/callback"

        REVISION_SUFFIX="v$$(cat /workspace/VERSION | tr '.' '-')"

        gcloud run deploy ${_SERVICE_NAME} \
          --image ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:$$(cat /workspace/TAG_VERSION) \
          --region ${_REGION} \
          --revision-suffix "$${REVISION_SUFFIX}" \
          --tag test \
          --no-traffic \
          --allow-unauthenticated \
          --set-secrets "CYCLING_COACH_DATABASE_URL=CYCLING_COACH_DATABASE_URL:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,JWT_SECRET=JWT_SECRET:latest,WITHINGS_CLIENT_ID=WITHINGS_CLIENT_ID:latest,WITHINGS_CLIENT_SECRET=WITHINGS_CLIENT_SECRET:latest" \
          --set-env-vars "GOOGLE_AUTH_ENABLED=true,CORS_ALLOWED_ORIGIN=$${SERVICE_URL},WITHINGS_REDIRECT_URI=$${WITHINGS_REDIRECT}"

        echo ""
        echo "================================================================"
        echo "Beta deployment complete!"
        echo "Tag:     $$(cat /workspace/TAG_VERSION)"
        echo "Version: $$(cat /workspace/VERSION)"
        echo "URL:     https://test---${_SERVICE_NAME}-*.a.run.app"
        echo "================================================================"

substitutions:
  _SERVICE_NAME: cycling-coach
  _REGION: us-central1
  _REPO: cloud-run-source-deploy

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/GOOGLE_CLIENT_ID/versions/latest
      env: GOOGLE_CLIENT_ID

serviceAccount: 'projects/${PROJECT_ID}/serviceAccounts/cycling-coach-deployer@${PROJECT_ID}.iam.gserviceaccount.com'

options:
  logging: CLOUD_LOGGING_ONLY
