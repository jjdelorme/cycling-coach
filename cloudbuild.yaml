steps:
  # Generate VERSION from git tags (e.g. "1.4.0" or "1.4.0-3-ge616f61")
  # Cloud Build downloads source as a tarball (no .git), so we shallow-clone to get tag info
  - name: 'gcr.io/cloud-builders/git'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        git clone --depth=50 --branch=${BRANCH_NAME} \
          https://github.com/jjdelorme/cycling-coach.git /tmp/repo
        cd /tmp/repo
        git fetch --tags
        RAW=$$(git describe --tags --always ${COMMIT_SHA} 2>/dev/null || echo "${SHORT_SHA}")
        echo "$${RAW#v}" > /workspace/VERSION
        echo "VERSION: $$(cat /workspace/VERSION)"

  # Build container image
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build \
          --build-arg "APP_VERSION=$$(cat VERSION)" \
          --build-arg "VITE_GOOGLE_CLIENT_ID=$$GOOGLE_CLIENT_ID" \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA} \
          .
    secretEnv: ['GOOGLE_CLIENT_ID']

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Get existing service URL (empty on first deploy)
        SERVICE_URL=$$(gcloud run services describe ${_SERVICE_NAME} \
          --region ${_REGION} \
          --format 'value(status.url)' 2>/dev/null || echo '')

        # Build revision suffix from VERSION file: "1.4.0" → "v1-4-0"
        # VERSION already includes commit info when not on a tagged commit
        REVISION_SUFFIX="v$$(cat VERSION | tr '.' '-')"

        gcloud run deploy ${_SERVICE_NAME} \
          --image ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA} \
          --region ${_REGION} \
          --revision-suffix "$${REVISION_SUFFIX}" \
          --allow-unauthenticated \
          --set-secrets "CYCLING_COACH_DATABASE_URL=CYCLING_COACH_DATABASE_URL:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,JWT_SECRET=JWT_SECRET:latest" \
          --set-env-vars "GOOGLE_AUTH_ENABLED=true,CORS_ALLOWED_ORIGIN=$${SERVICE_URL}"

substitutions:
  _SERVICE_NAME: cycling-coach
  _REGION: us-central1
  _REPO: cloud-run-source-deploy

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/GOOGLE_CLIENT_ID/versions/latest
      env: GOOGLE_CLIENT_ID

serviceAccount: 'projects/${PROJECT_ID}/serviceAccounts/cycling-coach-deployer@${PROJECT_ID}.iam.gserviceaccount.com'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
