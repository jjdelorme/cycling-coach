version: "3.8"

services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: coach-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: coach
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
    volumes:
      - coach-data:/var/lib/postgresql/data

volumes:
  coach-data:
